{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SocialApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .light-mode {
            background-color: #f0f2f5;
            color: #000;
        }

        .dark-mode {
            background-color: #121212;
            color: #fff;
        }

        .navbar {
            border-bottom: 1px solid #ddd;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .like-btn {
            transition: 0.2s;
        }

        .like-btn:hover {
            transform: scale(1.2);
            color: red;
        }
    </style>
</head>

<body class="light-mode" id="body">

<nav class="navbar navbar-light bg-white px-4">
    <a class="navbar-brand fw-bold" href="/home/">📸 SocialApp</a>

    <form method="get" action="/home/" class="d-flex w-50">
        <input class="form-control" type="search" name="q" placeholder="Search users...">
    </form>

    <div>
        <button onclick="toggleMode()" class="btn btn-outline-dark btn-sm">🌙</button>

        {% if user.is_authenticated %}
            <a href="/profile/{{ request.user.username }}" class="btn btn-outline-dark btn-sm">
    Profile
</a>
            <a href="/logout/" class="btn btn-dark btn-sm">Logout</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleMode() {
    let body = document.getElementById("body");

    if (body.classList.contains("light-mode")) {
        body.classList.remove("light-mode");
        body.classList.add("dark-mode");
    } else {
        body.classList.remove("dark-mode");
        body.classList.add("light-mode");
    }
}
</script>

</body>
</html>
