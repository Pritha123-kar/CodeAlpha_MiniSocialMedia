<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;

            /* Background Image */
            background: url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac') no-repeat center center/cover;
        }

        /* Dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        /* Center Card */
        .center-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.9);
            text-align: center;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        .footer small {
            display: block;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- CENTER LOGIN CARD -->
<div class="center-card shadow">

    <h3 class="mb-3">Mini Social Media</h3>

    <p>Connect • Share • Explore</p>

    <a href="/login/" class="btn btn-dark w-100 mb-2">Login</a>
    <a href="/register/" class="btn btn-outline-dark w-100">Sign Up</a>

</div>

<!-- FOOTER -->
<div class="footer">
    <div>Share your thoughts with the world 🌍</div>
    <div>Follow people and stay connected 💬</div>
    <small>@developed by PrithaKar</small>
</div>

</body>
</html>
